[metadata]
name = "claude-sessions"
description = "Browse, preview, and resume Claude Code sessions"
requirements = ["claude", "tv-claude-session"]

[source]
command = "tv-claude-session list"

[preview]
command = "tv-claude-session preview '{}'"

[ui]
layout = "landscape"
[ui.preview_panel]
size = 60
header = "Session: {}"
border_type = "rounded"

[keybindings]
shortcut = "f6"
enter = "actions:resume"
ctrl-z = "actions:resume-zellij"
ctrl-o = "actions:open"
ctrl-d = "actions:delete"

[actions.resume]
description = "cd to the session cwd and resume in this shell"
command = "eval \"$(tv-claude-session resume '{}')\""
mode = "execute"

[actions.resume-zellij]
description = "Open the session in a new zellij tab"
command = "eval \"$(tv-claude-session resume-zellij '{}')\""
mode = "execute"

[actions.open]
description = "Open the session jsonl in $EDITOR"
command = "eval \"$(tv-claude-session open '{}')\""
mode = "execute"

[actions.delete]
description = "Delete the session jsonl (and sidechain dir)"
command = "tv-claude-session delete '{}'"
mode = "fork"
